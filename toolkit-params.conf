# =============================================================
# TOOLKIT CONFIGURATION PARAMETERS
# =============================================================
# Edit this file before running apply-params.sh
# Replace every [EDIT THIS] with your actual value
# Do not remove or rename parameter keys
# Do not add spaces around the = sign
# Lines starting with # are comments — ignored by the script
# =============================================================

# --- PROJECT IDENTITY ---

# Display name shown in headers and reports
# Example: Adaptive Workout App
PROJECT_NAME=Adaptive Workout App

# Kebab-case slug for file names and git branches
# Example: adaptive-workout-app
# Rules: lowercase, hyphens only, no spaces or underscores
PROJECT_SLUG=adaptive-workout-app

# Your name or handle for author fields
# Example: JD
AUTHOR=JD

# --- EXPO / REACT NATIVE ---

# Expo project slug (must match your Expo dashboard)
# Example: adaptive-workout
EXPO_SLUG=adaptive-workout

# iOS bundle identifier (reverse domain notation)
# Example: com.jd.adaptiveworkout
BUNDLE_ID_IOS=com.jd.adaptiveworkout

# Android package name (usually same as iOS)
# Example: com.jd.adaptiveworkout
BUNDLE_ID_ANDROID=com.jd.adaptiveworkout

# Your Expo account username from expo.dev
# Example: jdsmith
EXPO_USERNAME=tobiusnc

# Minimum iOS version — Expo SDK 55 default, change only if needed
IOS_MIN_VERSION=16.0

# Minimum Android SDK — Expo SDK 55 default, change only if needed
ANDROID_MIN_SDK=24

# --- TECHNICAL STACK ---

# State management library
# Options: zustand | redux | jotai | TBD
STATE_MGMT=zustand

# Local storage and offline sync
# Options: powersync-sqlcipher | expo-sqlite | TBD
LOCAL_STORAGE=powersync-sqlcipher

# --- NOTIFICATIONS ---

# How Claude Code alerts you to blockers during autonomous runs
# Options:
#   macos    — Mac system notifications, zero setup (recommended to start)
#   pushover — Mobile push via free Pushover account
#   both     — osascript now, Pushover wired but inactive
NOTIFICATION_MODE=none

# Pushover credentials — only needed if NOTIFICATION_MODE=pushover or both
# Get from https://pushover.net after creating a free account
# Leave as [EDIT THIS] if using macos only
PUSHOVER_APP_TOKEN=[EDIT THIS]
PUSHOVER_USER_KEY=[EDIT THIS]

# --- GIT ---

# Default branch name
GIT_BRANCH=main

# Remote URL — set to NONE if not created yet
# Example: git@github.com:username/adaptive-workout-app.git
GIT_REMOTE=https://github.com/tobiusnc/adaptiveworkout.git

# --- ANTHROPIC MODELS ---
# Only change these if Anthropic releases newer models
# Current as of 2026-03-19

MODEL_REASONING=claude-sonnet-4-6
MODEL_SUMMARIZATION=claude-haiku-4-5-20251001
MODEL_REVIEW=claude-opus-4-6

# =============================================================
# END — do not add parameters below this line
# =============================================================
